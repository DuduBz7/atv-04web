<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum CR</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<!-- Window: Header -->
<header class="topo">
    <div class="logo">
        <img src="images/crown.png" alt="Crown icon">
        <h1>Fórum CR</h1>
    </div>

    <nav aria-label="Navegação principal">
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="paginas/comentarios/comentarios.html">Comentários</a></li>
            <li><a href="paginas/pesquisados/pesquisados.html">Pesquisados</a></li>
            <li><a href="paginas/decks/decks.html">Decks</a></li>
        </ul>
    </nav>
</header>

<!-- Window: Title bar -->
<section class="titulo" aria-label="Seção de posts recentes">
    <h2>MAIS RECENTES</h2>
</section>

<!-- Window: Grid of posts -->
<main class="grid" aria-label="Posts recentes">

    <div class="card grande">
        <img src="images/post1.jpg" alt="Tudo sobre o Balão Herói">
        <div class="overlay">
            <h3>Tudo sobre o Balão Herói</h3>
        </div>
    </div>

    <div class="card">
        <img src="images/post2.jpg" alt="Evolução da Horda">
        <div class="overlay">
            <h3>Evolução da Horda</h3>
        </div>
    </div>

    <div class="card">
        <img src="images/post3.jpg" alt="Emote grátis">
        <div class="overlay">
            <h3>Emote grátis</h3>
        </div>
    </div>

    <div class="card">
        <img src="images/post4.jpg" alt="Nova animação">
        <div class="overlay">
            <h3>Nova animação</h3>
        </div>
    </div>

</main>

</body>
</html>
